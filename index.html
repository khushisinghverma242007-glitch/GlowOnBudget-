<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glow On Budget</title>

<style>

body{
margin:0;
font-family: Arial, sans-serif;
background-image:url("https://images.unsplash.com/photo-1607746882042-944635dfe10e");
background-size:cover;
background-attachment:fixed;
color:white;
}

header{
text-align:center;
padding:40px;
background:rgba(0,0,0,0.6);
}

h1{
font-size:40px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:40px;
}

.card{
background:rgba(0,0,0,0.7);
padding:20px;
width:220px;
border-radius:12px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
background:#ff4d6d;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff1f4b;
}

</style>
</head>

<body>

<header>
<h1>Glow On Budget</h1>
<p>Affordable Fashion & Beauty Finds</p>
</header>

<div class="products">

<div class="card">
<img src="https://i.imgur.com/2DhmtJ4.jpg">
<h3>Fashion Top</h3>
<p>Trendy and affordable</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://i.imgur.com/Xn7YQZK.jpg">
<h3>Stylish Bag</h3>
<p>Perfect for daily use</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://i.imgur.com/5tj6S7O.jpg">
<h3>Beauty Product</h3>
<p>Glow on a budget</p>
<button>Buy Now</button>
</div>

</div>

</body>
</html>
